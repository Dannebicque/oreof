    changeRf:
      type: 'workflow'
      marking_store:
        type: 'method'
        property: 'etatDemande'
      supports:
        - App\Entity\ChangeRf
      initial_marking: 'demande_initialisee'
      places:
        demande_initialisee:
          metadata:
            process: true
            label: 'validation.demande_initialisee'
            color: 'info'
            icon: 'mdi:people-check'
        soumis_conseil:
          metadata:
            process: true
            icon: 'mdi:people-check'
            label: 'validation.soumis_conseil'
            color: 'success'
        soumis_ses:
          metadata:
            process: true
            icon: 'flowbite:school-check-alt-outline'
            label: 'validation.soumis_ses'
            color: 'success'
        soumis_cfvu:
          metadata:
            process: true
            icon: 'flowbite:shield-check-outline'
            label: 'validation.soumis_cfvu'
            color: 'success'
        attente_pv:
          metadata:
            process: false
            label: 'validation.attente_pv'
            color: 'warning'
            icon: 'ph:hourglass'
        effectuee:
          metadata:
            process: false
            label: 'validation.effectuee'
            color: 'success'
            icon: 'ph:check'
        verification_pv:
          metadata:
            process: false
            label: 'validation.verification_pv'
            color: 'warning'
            icon: 'ph:check'
      transitions:
        effectuer_demande:
          from: 'demande_initialisee'
          to: 'soumis_conseil'
        valider_conseil:
          from: 'soumis_conseil'
          to: 'soumis_ses'
          metadata:
            type: valider
            btn: success
            icon: ph:check
            hasDate: true
            hasUpload: true
        valider_ses:
          from: 'soumis_ses'
          to: 'soumis_cfvu'
          metadata:
            type: valider
            btn: success
            icon: ph:check
        reserver_ses:
          from: 'soumis_ses'
          to: 'demande_initialisee'
          metadata:
            type: reserver
            btn: warning
            icon: material-symbols:fact-check-outline-sharp
        valider_cfvu_avec_pv:
          from: 'soumis_cfvu'
          to: 'effectuee'
          metadata:
            type: valider
            btn: success
            icon: ph:check
            hasDate: true
        valider_cfvu_attente_pv:
          from: 'soumis_cfvu'
          to: 'attente_pv'
          metadata:
            type: valider
            btn: success
            icon: ph:check
            hasDate: true
        reserver_cfvu:
          from: 'soumis_cfvu'
          to: 'demande_initialisee'
          metadata:
            type: reserver
            btn: warning
            icon: material-symbols:fact-check-outline-sharp
        deposer_pv:
          from: 'attente_pv'
          to: 'verification_pv' #etape intermédiaire de contrôle
          metadata:
            type: valider
            btn: success
            icon: ph:check
            hasUpload: true
        valider_pv:
          from: 'verification_pv'
          to: 'effectuee'
          metadata:
            type: valider
            btn: success
            icon: ph:check
