<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Logo API Test</title>
    <style>
        body { font-family: sans-serif; padding: 2rem; background: #f5f5f5; }
        h1 { font-size: 1.2rem; font-weight: 500; margin-bottom: 1.5rem; }
        .controls { display: flex; gap: 8px; align-items: center; margin-bottom: 1rem; flex-wrap: wrap; }
        input { padding: 6px 10px; border: 1px solid #ccc; border-radius: 6px; font-size: 14px; }
        button { padding: 6px 14px; border: 1px solid #ccc; border-radius: 6px; background: white; cursor: pointer; font-size: 14px; }
        button:hover { background: #eee; }
        #status { font-size: 13px; color: #666; margin-bottom: 1rem; min-height: 18px; }
        .error { color: #c0392b; }
        .section-title { font-size: 13px; color: #888; margin: 0 0 8px; }
        .section { margin-bottom: 1.5rem; }
        .cards { display: flex; flex-wrap: wrap; gap: 12px; }
        .card { background: white; border: 1px solid #e0e0e0; border-radius: 10px; padding: 1rem; display: flex; flex-direction: column; align-items: center; gap: 8px; }
        .card img { max-width: 150px; max-height: 150px; object-fit: contain; }
        .card span { font-size: 11px; color: #999; }
        #results { display: none; }
        .divider { border: none; border-top: 1px solid #ddd; margin: 2rem 0; }
        #results-url { display: none; }
    </style>
</head>
<body>
<h1>Logo API tester</h1>

<!-- Form 1: base64 -->
<p style="font-size: 13px; color: #888; margin-bottom: 8px;">Mode : base64</p>
<div class="controls">
    <input type="number" id="parcoursId" placeholder="Parcours ID" value="905" style="width: 120px;" />
    <select id="route">
        <option value="cfvu_valid">cfvu_valid</option>
        <option value="base">base</option>
    </select>
    <button onclick="fetchLogos()">Fetch logos</button>
</div>
<div id="status"></div>
<div id="results">
    <div id="sections"></div>
</div>

<hr class="divider" />

<!-- Form 2: URL -->
<p style="font-size: 13px; color: #888; margin-bottom: 8px;">Mode : URL</p>
<div class="controls">
    <input type="number" id="parcoursIdUrl" placeholder="Parcours ID" value="905" style="width: 120px;" />
    <select id="routeUrl">
        <option value="cfvu_valid">cfvu_valid</option>
        <option value="base">base</option>
    </select>
    <button onclick="fetchLogosUrl()">Fetch logos</button>
</div>
<div id="status-url"></div>
<div id="results-url">
    <div id="sections-url"></div>
</div>

<script>
    function setStatus(msg, isError, suffix = '') {
        const el = document.getElementById('status' + suffix);
        el.textContent = msg;
        el.className = isError ? 'error' : '';
    }

    function buildSection(title, logos, mode) {
        if (!logos || logos.length === 0) return '';
        const cards = logos.map(logo => {
            const src = mode === 'url'
                ? logo.image_data
                : `data:${logo.image_type};base64,${logo.image_data}`;
            return `
                    <div class="card">
                        <img src="${src}" alt="logo" />
                        <span>${logo.image_type}</span>
                    </div>
                `;
        }).join('');
        return `<div class="section"><p class="section-title">${title}</p><div class="cards">${cards}</div></div>`;
    }

    async function doFetch(id, route, resultsDivId, sectionsDivId, statusSuffix, mode) {
        const url = route === 'cfvu_valid'
            ? `/parcours/${id}/export-json-urca/cfvu_valid`
            : `/parcours/${id}/export-json-urca`;

        setStatus('Fetching...', false, statusSuffix);
        document.getElementById(resultsDivId).style.display = 'none';

        try {
            const res = await fetch(url);
            if (!res.ok) throw new Error(`HTTP ${res.status} — ${await res.text()}`);
            const data = await res.json();

            const logos = data.logos;
            if (!logos) {
                setStatus('No logos key in response — controller changes may not be deployed yet.', true, statusSuffix);
                return;
            }

            const total = (logos.parcours?.length ?? 0) + (logos.formation?.length ?? 0) + (logos.type_diplome?.length ?? 0);
            if (total === 0) {
                setStatus('Response OK — no logos attached to this parcours.', false, statusSuffix);
                return;
            }

            setStatus(`${total} logo(s) found.`, false, statusSuffix);
            document.getElementById(sectionsDivId).innerHTML =
                buildSection('Parcours', logos.parcours, mode) +
                buildSection('Formation', logos.formation, mode) +
                buildSection('Type de diplôme', logos.type_diplome, mode);
            document.getElementById(resultsDivId).style.display = 'block';

        } catch (e) {
            setStatus(`Error: ${e.message}`, true, statusSuffix);
        }
    }

    function fetchLogos() {
        doFetch(
            document.getElementById('parcoursId').value,
            document.getElementById('route').value,
            'results', 'sections', '', 'base64'
        );
    }

    function fetchLogosUrl() {
        doFetch(
            document.getElementById('parcoursIdUrl').value,
            document.getElementById('routeUrl').value,
            'results-url', 'sections-url', '-url', 'url'
        );
    }
</script>
</body>
</html>
